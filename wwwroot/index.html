<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Hlášení stavu počítadel — Canon CZ</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #CC0000;
      --red-dark:   #A80000;
      --red-deeper: #7A0000;
      --red-tint:   #FFF5F5;
      --red-border: #F5C0C0;
      --ink:        #1C1C1C;
      --ink-mid:    #444;
      --ink-muted:  #777;
      --ink-faint:  #AAA;
      --line:       #E4E4E4;
      --surface:    #FAFAFA;
      --white:      #FFFFFF;
      --success:    #1A6B3C;
      --success-bg: #F0FBF5;
      --warn:       #7A4800;
      --warn-bg:    #FFFBF0;
      --warn-border:#F5D78A;
      --info:       #1A4A7A;
      --info-bg:    #F0F6FF;
      --info-border:#B0CCEE;
      --radius:     6px;
      --shadow:     0 2px 12px rgba(0,0,0,.08);
      --shadow-lg:  0 4px 24px rgba(0,0,0,.12);
      --font-body:  'Georgia', 'Times New Roman', serif;
      --font-ui:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 180ms ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-ui);
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 100px; /* room for sticky bar */
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .site-header {
      background: var(--red);
      background-image: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 60%);
      color: white;
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-mark {
      font-family: var(--font-body);
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
      color: white;
      line-height: 1;
      flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,.3);
      padding-right: 20px;
    }

    .header-text { flex: 1; min-width: 0; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: white;
      line-height: 1.3;
    }

    .header-sub {
      font-size: 12px;
      color: rgba(255,255,255,.65);
      margin-top: 2px;
      letter-spacing: .3px;
    }

    /* ── Main layout ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 0;
    }

    /* ── Period bar ── */
    .period-bar {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .period-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .period-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--ink-muted);
    }

    .period-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }

    .period-value.deadline-near { color: var(--warn); }
    .period-value.deadline-past { color: var(--red); }

    /* ── Banners ── */
    .banner {
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid;
    }

    .banner-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      margin-top: 1px;
    }

    .banner-warn  { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); }
    .banner-warn  .banner-icon { background: var(--warn); color: white; }
    .banner-info  { background: var(--info-bg); border-color: var(--info-border); color: var(--info); }
    .banner-info  .banner-icon { background: var(--info); color: white; }
    .banner-error { background: var(--red-tint); border-color: var(--red-border); color: var(--red-dark); }
    .banner-error .banner-icon { background: var(--red); color: white; }

    .banner-text strong { display: block; margin-bottom: 2px; }

    /* ── Formula hint ── */
    .formula-hint {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .formula-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink-mid);
      font-family: var(--font-ui);
      font-weight: 500;
      text-align: left;
    }

    .formula-toggle:hover { background: var(--surface); }

    .formula-toggle .arrow {
      width: 18px;
      height: 18px;
      transition: transform var(--transition);
      opacity: .5;
    }

    .formula-toggle.open .arrow { transform: rotate(180deg); }

    .formula-body {
      display: none;
      padding: 0 18px 14px;
      border-top: 1px solid var(--line);
    }

    .formula-body.open { display: block; }

    .formula-body p {
      font-size: 13px;
      color: var(--ink-mid);
      line-height: 1.6;
      margin-top: 12px;
    }

    .formula-code {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 10px 14px;
      margin-top: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--ink);
      line-height: 1.8;
    }

    /* ── Printer cards ── */
    .printer-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeSlideIn .3s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .printer-header {
      background: var(--ink);
      background-image: linear-gradient(135deg, #1C1C1C 0%, #333 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 20px;
    }

    .printer-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,.12);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .printer-icon svg { width: 18px; height: 18px; fill: white; opacity: .8; }

    .printer-info { flex: 1; min-width: 0; }

    .printer-model {
      font-size: 14px;
      font-weight: 600;
      color: white;
      line-height: 1.3;
    }

    .printer-serial {
      font-size: 12px;
      color: rgba(255,255,255,.55);
      font-family: 'Courier New', monospace;
      margin-top: 2px;
    }

    .printer-config {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.8);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── Counter rows ── */
    .counter-row {
      border-top: 1px solid var(--line);
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr 140px 200px;
      gap: 16px;
      align-items: start;
      transition: background var(--transition);
    }

    .counter-row:first-child { border-top: none; }
    .counter-row.row-valid   { background: linear-gradient(90deg, #F9FFF9 0%, white 40%); }
    .counter-row.row-error   { background: linear-gradient(90deg, #FFF8F8 0%, white 40%); }

    .counter-meta {}

    .counter-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .counter-type {
      font-size: 12px;
      color: var(--ink-muted);
    }

    .counter-prev {
      text-align: center;
    }

    .prev-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--ink-faint);
      margin-bottom: 4px;
    }

    .prev-value {
      font-size: 22px;
      font-weight: 300;
      color: var(--ink-mid);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }

    .counter-inputs {}

    .field-group {
      margin-bottom: 10px;
    }

    .field-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--ink-muted);
      margin-bottom: 5px;
    }

    input[type="number"],
    textarea {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 15px;
      font-family: var(--font-ui);
      color: var(--ink);
      background: white;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus,
    textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(204,0,0,.1);
    }

    input.input-valid  { border-color: #4CAF50; }
    input.input-error  { border-color: var(--red); }

    textarea {
      resize: vertical;
      min-height: 56px;
      font-size: 13px;
    }

    textarea:disabled,
    input:disabled { background: #F5F5F5; color: var(--ink-muted); cursor: not-allowed; }

    .field-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 4px;
      display: none;
      animation: fadeIn .15s ease;
    }

    .field-error.visible { display: block; }

    .field-diff {
      font-size: 12px;
      color: var(--success);
      margin-top: 4px;
      font-weight: 500;
      display: none;
      animation: fadeIn .15s ease;
    }

    .field-diff.visible { display: block; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Sticky submit bar ── */
    .submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid var(--line);
      box-shadow: 0 -4px 20px rgba(0,0,0,.1);
      z-index: 100;
      padding: 12px 24px;
    }

    .submit-bar-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .progress-wrap { flex: 1; }

    .progress-text {
      font-size: 13px;
      color: var(--ink-mid);
      margin-bottom: 5px;
    }

    .progress-text strong { color: var(--ink); }

    .progress-track {
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-dark), var(--red));
      border-radius: 2px;
      transition: width .3s ease;
    }

    .btn-submit {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
      letter-spacing: .2px;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--red-dark);
      box-shadow: 0 2px 8px rgba(168,0,0,.4);
    }

    .btn-submit:active:not(:disabled) { transform: scale(.98); }

    .btn-submit:disabled {
      background: var(--ink-faint);
      cursor: not-allowed;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #F0F0F0 25%, #E0E0E0 50%, #F0F0F0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .skeleton-header { height: 60px; }
    .skeleton-row { padding: 18px 20px; border-top: 1px solid var(--line); display: flex; gap: 16px; }
    .skeleton-block { border-radius: 4px; }

    /* ── Error / success full-page ── */
    .state-page {
      max-width: 520px;
      margin: 60px auto 0;
      text-align: center;
      padding: 0 24px;
    }

    .state-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .state-icon svg { width: 28px; height: 28px; }

    .state-icon.icon-error   { background: var(--red-tint); }
    .state-icon.icon-success { background: var(--success-bg); }

    .state-icon.icon-error svg   { stroke: var(--red); }
    .state-icon.icon-success svg { stroke: var(--success); }

    .state-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .state-body {
      font-size: 15px;
      color: var(--ink-mid);
      line-height: 1.6;
    }

    /* ── Success summary table ── */
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
      text-align: left;
      font-size: 13px;
    }

    .summary-table th {
      background: var(--surface);
      padding: 8px 12px;
      font-weight: 600;
      color: var(--ink-mid);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      border: 1px solid var(--line);
    }

    .summary-table td {
      padding: 10px 12px;
      border: 1px solid var(--line);
      color: var(--ink);
      vertical-align: top;
    }

    .summary-table tr:nth-child(even) td { background: var(--surface); }

    .tag-submitted {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--success-bg);
      color: var(--success);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #A8D8BC;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .header-inner { padding: 12px 16px; gap: 14px; }
      .logo-mark { font-size: 22px; padding-right: 14px; }
      .main { padding: 16px 16px 0; }
      .period-bar { padding: 12px 16px; }

      .counter-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .counter-prev { text-align: left; display: flex; align-items: center; gap: 12px; }
      .prev-label { margin-bottom: 0; }

      .submit-bar-inner { flex-wrap: wrap; }
      .progress-wrap { flex-basis: 100%; }
      .btn-submit { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-mark">CANON</div>
    <div class="header-text">
      <div class="header-title">Hlášení stavu počítadel</div>
      <div class="header-sub">Servisní portál — hlášení měsíčních počítadel</div>
    </div>
  </div>
</header>

<!-- ── Content ── -->
<main class="main" id="app">
  <!-- States are injected here by JS -->
</main>

<!-- ── Sticky submit bar (shown only in form state) ── -->
<div class="submit-bar" id="submitBar" style="display:none;">
  <div class="submit-bar-inner">
    <div class="progress-wrap">
      <div class="progress-text">
        Vyplněno: <strong><span id="progressFilled">0</span> / <span id="progressTotal">0</span></strong> počítadel
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <button class="btn-submit" id="btnSubmit" disabled onclick="handleSubmit()">
      Odeslat hlášení
    </button>
  </div>
</div>

<script>
  // ── State ──
  let idcode = null;
  let data = null; // API response
  let formValues = {}; // { recordId: { value, poznamka } }

  // ── Boot ──
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    idcode = params.get('idcode');

    if (!idcode || idcode.trim() === '') {
      renderErrorState('Chybí přístupový kód', 'Odkaz v emailu není platný nebo je neúplný. Zkontrolujte, zda jste zkopírovali celý odkaz z emailu.');
      return;
    }

    renderLoading();
    fetchDevices();
  });

  // ── API ──
  async function fetchDevices() {
    try {
      const resp = await fetch(`/api/user/${encodeURIComponent(idcode)}`);
      if (resp.status === 404) {
        renderErrorState('Neplatný nebo expirovaný odkaz', 'Tento odkaz není platný nebo již vypršela jeho platnost. Hlášení se vztahuje vždy k aktuálnímu měsíci — minulé odkazy nejsou funkční.');
        return;
      }
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
      renderForm();
    } catch (e) {
      renderErrorState('Chyba připojení', 'Nepodařilo se načíst data. Zkontrolujte připojení k internetu a zkuste stránku obnovit.');
    }
  }

  async function handleSubmit() {
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Odesílám…';

    if (data.alreadySubmitted) {
      const ok = confirm('Toto hlášení bylo již odesláno. Opravdu chcete odeslat nové hodnoty?');
      if (!ok) {
        btn.disabled = false;
        btn.textContent = 'Odeslat hlášení';
        return;
      }
    }

    const payload = data.devices.map(d => ({
      recordId: d.recordId,
      aktualniStavPocitadla: parseInt(formValues[d.recordId]?.value, 10),
      poznamka: formValues[d.recordId]?.poznamka || null
    }));

    try {
      const resp = await fetch(`/api/user/${encodeURIComponent(idcode)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (resp.status === 422) {
        const msg = await resp.text();
        alert('Hlášení nelze odeslat: ' + msg);
        btn.disabled = false;
        btn.textContent = 'Odeslat hlášení';
        return;
      }

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      document.getElementById('submitBar').style.display = 'none';
      renderSuccess(payload);
    } catch (e) {
      alert('Odeslání se nezdařilo. Zkuste to prosím znovu.');
      btn.disabled = false;
      btn.textContent = 'Odeslat hlášení';
    }
  }

  // ── Renderers ──
  function renderLoading() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="skeleton-card">
        <div class="skeleton skeleton-header"></div>
        <div class="skeleton-row">
          <div class="skeleton skeleton-block" style="flex:1;height:60px;"></div>
          <div class="skeleton skeleton-block" style="width:130px;height:60px;"></div>
          <div class="skeleton skeleton-block" style="width:180px;height:60px;"></div>
        </div>
        <div class="skeleton-row" style="border-top:1px solid #eee;">
          <div class="skeleton skeleton-block" style="flex:1;height:60px;"></div>
          <div class="skeleton skeleton-block" style="width:130px;height:60px;"></div>
          <div class="skeleton skeleton-block" style="width:180px;height:60px;"></div>
        </div>
      </div>
      <div class="skeleton-card" style="animation-delay:.1s">
        <div class="skeleton skeleton-header"></div>
        <div class="skeleton-row">
          <div class="skeleton skeleton-block" style="flex:1;height:60px;"></div>
          <div class="skeleton skeleton-block" style="width:130px;height:60px;"></div>
          <div class="skeleton skeleton-block" style="width:180px;height:60px;"></div>
        </div>
      </div>
      <p style="text-align:center;color:var(--ink-faint);font-size:13px;margin-top:12px;">Načítám data…</p>
    `;
  }

  function renderErrorState(title, body) {
    document.getElementById('submitBar').style.display = 'none';
    document.getElementById('app').innerHTML = `
      <div class="state-page">
        <div class="state-icon icon-error">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="state-title">${esc(title)}</div>
        <div class="state-body">${esc(body)}</div>
      </div>
    `;
  }

  function renderSuccess(payload) {
    const rows = data.devices.map(d => {
      const submitted = payload.find(p => p.recordId === d.recordId);
      return `
        <tr>
          <td>${esc(d.typStroje)}</td>
          <td style="font-family:monospace">${esc(d.vyrobniCislo)}</td>
          <td>${esc(d.nazevPocitadla)}</td>
          <td style="text-align:right;font-variant-numeric:tabular-nums;">${submitted?.aktualniStavPocitadla?.toLocaleString('cs-CZ') ?? '—'}</td>
          <td><span class="tag-submitted">✓ Odesláno</span></td>
        </tr>
      `;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="state-page" style="max-width:700px;text-align:left;">
        <div style="text-align:center;">
          <div class="state-icon icon-success" style="margin-bottom:16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </div>
          <div class="state-title">Hlášení bylo úspěšně odesláno</div>
          <div class="state-body" style="margin-bottom:24px;">Děkujeme za nahlášení stavu počítadel. Níže je přehled odeslaných hodnot.</div>
        </div>
        <table class="summary-table">
          <thead>
            <tr>
              <th>Typ stroje</th>
              <th>Sér. číslo</th>
              <th>Počítadlo</th>
              <th style="text-align:right">Odeslaný stav</th>
              <th>Stav</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <p style="font-size:13px;color:var(--ink-muted);margin-top:16px;line-height:1.5;">
          Toto okno můžete zavřít. V případě opravy použijte stejný odkaz z emailu a hodnoty odešlete znovu.
        </p>
      </div>
    `;
  }

  function renderForm() {
    const app = document.getElementById('app');
    const html = [];

    // Period bar
    const period = formatPeriod(data.period);
    const deadline = formatDate(data.deadline);
    const deadlineClass = data.isPastDeadline ? 'deadline-past' : '';
    html.push(`
      <div class="period-bar">
        <div class="period-item">
          <span class="period-label">Období hlášení:</span>
          <span class="period-value">${period}</span>
        </div>
        <div class="period-item">
          <span class="period-label">Termín odevzdání:</span>
          <span class="period-value ${deadlineClass}">${deadline}</span>
        </div>
      </div>
    `);

    // Banners
    if (data.isPastDeadline) {
      html.push(`
        <div class="banner banner-warn">
          <div class="banner-icon">!</div>
          <div class="banner-text">
            <strong>Termín pro odevzdání hlášení uplynul</strong>
            Termín pro odevzdání hlášení již uplynul. Kontaktujte servisní oddělení.
          </div>
        </div>
      `);
    } else if (data.alreadySubmitted) {
      html.push(`
        <div class="banner banner-info">
          <div class="banner-icon">i</div>
          <div class="banner-text">
            <strong>Hlášení bylo již odesláno</strong>
            Toto hlášení bylo již odesláno. Hodnoty můžete opravit a odeslat znovu.
          </div>
        </div>
      `);
    }

    // Formula hint
    html.push(`
      <div class="formula-hint">
        <button class="formula-toggle" id="formulaToggle" onclick="toggleFormula()">
          <span>ℹ Výpočet počítadel Total BW / Total Colour</span>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="formula-body" id="formulaBody">
          <p>Pokud Váš stroj neobsahuje počítadla <strong>Total BW</strong> a <strong>Total Colour</strong>, použijte prosím tato počítadla, která jsou na stroji nastavena:</p>
          <div class="formula-code">
            Total BW &nbsp;&nbsp;&nbsp;= 2 × 112 (Black/Large) + 113 (Black/Small)<br>
            Total Colour = 2 × 122 (Color/Large) + 123 (Color/Small)
          </div>
          <p>Počítadla 112, 113, 122, 123 najdete v menu tiskárny v sekci počítadel.</p>
        </div>
      </div>
    `);

    // Group devices by vyrobniCislo + typKonfigurace
    const groups = groupDevices(data.devices);

    for (const group of groups) {
      html.push(`
        <div class="printer-card">
          <div class="printer-header">
            <div class="printer-icon">
              <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
            </div>
            <div class="printer-info">
              <div class="printer-model">${esc(group.typStroje)}</div>
              <div class="printer-serial">SN: ${esc(group.vyrobniCislo)}</div>
            </div>
            <div class="printer-config">${esc(group.typKonfigurace)}</div>
          </div>
          ${group.devices.map(d => renderCounterRow(d)).join('')}
        </div>
      `);
    }

    app.innerHTML = html.join('');

    // Pre-fill if already submitted
    if (data.alreadySubmitted) {
      data.devices.forEach(d => {
        if (d.aktualniStavPocitadla != null) {
          formValues[d.recordId] = {
            value: String(d.aktualniStavPocitadla),
            poznamka: d.poznamka || ''
          };
          const input = document.getElementById(`val-${d.recordId}`);
          if (input) {
            input.value = d.aktualniStavPocitadla;
            validateField(d.recordId);
          }
          const note = document.getElementById(`note-${d.recordId}`);
          if (note) note.value = d.poznamka || '';
        }
      });
    } else {
      data.devices.forEach(d => {
        formValues[d.recordId] = { value: '', poznamka: '' };
      });
    }

    if (!data.isPastDeadline) {
      document.getElementById('submitBar').style.display = '';
    }

    updateProgress();
  }

  function renderCounterRow(d) {
    const disabled = data.isPastDeadline ? 'disabled' : '';
    const prevFormatted = d.posledniStavPocitadla != null
      ? d.posledniStavPocitadla.toLocaleString('cs-CZ')
      : '—';

    return `
      <div class="counter-row" id="row-${d.recordId}">
        <div class="counter-meta">
          <div class="counter-name">${esc(d.nazevPocitadla)}</div>
          <div class="counter-type">Typ: ${esc(d.typPocitadla)}</div>
        </div>

        <div class="counter-prev">
          <div class="prev-label">Stav minulého hlášení</div>
          <div class="prev-value">${prevFormatted}</div>
        </div>

        <div class="counter-inputs">
          <div class="field-group">
            <label for="val-${d.recordId}">Aktuální stav počítadla *</label>
            <input
              type="number"
              id="val-${d.recordId}"
              placeholder="Zadejte aktuální stav"
              min="${d.posledniStavPocitadla ?? 0}"
              step="1"
              ${disabled}
              oninput="onValueInput(${d.recordId}, ${d.posledniStavPocitadla ?? 0})"
              onblur="onValueBlur(${d.recordId}, ${d.posledniStavPocitadla ?? 0})"
            />
            <div class="field-error" id="err-${d.recordId}"></div>
            <div class="field-diff" id="diff-${d.recordId}"></div>
          </div>
          <div class="field-group">
            <label for="note-${d.recordId}">Poznámka</label>
            <textarea
              id="note-${d.recordId}"
              placeholder="Volitelná poznámka (např. výměna stroje, servisní zásah…)"
              rows="2"
              ${disabled}
              oninput="onNoteInput(${d.recordId})"
            ></textarea>
          </div>
        </div>
      </div>
    `;
  }

  // ── Validation ──
  function validateField(recordId, prev, touched = false) {
    const input   = document.getElementById(`val-${recordId}`);
    const errEl   = document.getElementById(`err-${recordId}`);
    const diffEl  = document.getElementById(`diff-${recordId}`);
    const row     = document.getElementById(`row-${recordId}`);
    const rawVal  = input.value.trim();

    // Clear
    input.classList.remove('input-valid', 'input-error');
    errEl.classList.remove('visible');
    diffEl.classList.remove('visible');
    row.classList.remove('row-valid', 'row-error');

    if (rawVal === '') {
      if (touched) {
        errEl.textContent = 'Toto pole je povinné';
        errEl.classList.add('visible');
        input.classList.add('input-error');
        row.classList.add('row-error');
      }
      formValues[recordId] = { ...formValues[recordId], value: '' };
      updateProgress();
      return false;
    }

    if (!/^-?\d+$/.test(rawVal)) {
      errEl.textContent = 'Zadejte celé číslo';
      errEl.classList.add('visible');
      input.classList.add('input-error');
      row.classList.add('row-error');
      formValues[recordId] = { ...formValues[recordId], value: '' };
      updateProgress();
      return false;
    }

    const val = parseInt(rawVal, 10);
    const prevVal = prev ?? 0;

    if (val < prevVal) {
      errEl.textContent = `Hodnota nesmí být nižší než minulý stav (${prevVal.toLocaleString('cs-CZ')})`;
      errEl.classList.add('visible');
      input.classList.add('input-error');
      row.classList.add('row-error');
      formValues[recordId] = { ...formValues[recordId], value: '' };
      updateProgress();
      return false;
    }

    // Valid
    input.classList.add('input-valid');
    row.classList.add('row-valid');
    formValues[recordId] = { ...formValues[recordId], value: String(val) };

    const diff = val - prevVal;
    diffEl.textContent = `+${diff.toLocaleString('cs-CZ')} kopií od minulého hlášení`;
    diffEl.classList.add('visible');

    updateProgress();
    return true;
  }

  function onValueInput(recordId, prev) {
    const input = document.getElementById(`val-${recordId}`);
    if (input.value !== '') validateField(recordId, prev, true);
    else {
      input.classList.remove('input-valid', 'input-error');
      document.getElementById(`err-${recordId}`).classList.remove('visible');
      document.getElementById(`diff-${recordId}`).classList.remove('visible');
      document.getElementById(`row-${recordId}`).classList.remove('row-valid', 'row-error');
      formValues[recordId] = { ...formValues[recordId], value: '' };
      updateProgress();
    }
  }

  function onValueBlur(recordId, prev) { validateField(recordId, prev, true); }

  function onNoteInput(recordId) {
    const note = document.getElementById(`note-${recordId}`);
    formValues[recordId] = { ...formValues[recordId], poznamka: note.value };
  }

  // ── Progress ──
  function updateProgress() {
    if (!data) return;
    const total  = data.devices.length;
    const filled = data.devices.filter(d => formValues[d.recordId]?.value !== '').length;
    const pct    = total > 0 ? Math.round((filled / total) * 100) : 0;

    document.getElementById('progressFilled').textContent = filled;
    document.getElementById('progressTotal').textContent  = total;
    document.getElementById('progressFill').style.width   = pct + '%';
    document.getElementById('btnSubmit').disabled = filled < total;
  }

  // ── Formula toggle ──
  function toggleFormula() {
    const toggle = document.getElementById('formulaToggle');
    const body   = document.getElementById('formulaBody');
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  }

  // ── Grouping ──
  function groupDevices(devices) {
    const map = new Map();
    for (const d of devices) {
      const key = `${d.vyrobniCislo}||${d.typKonfigurace}`;
      if (!map.has(key)) {
        map.set(key, {
          typStroje:      d.typStroje,
          vyrobniCislo:   d.vyrobniCislo,
          typKonfigurace: d.typKonfigurace,
          devices:        []
        });
      }
      map.get(key).devices.push(d);
    }
    return Array.from(map.values());
  }

  // ── Helpers ──
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatPeriod(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('cs-CZ', { month: 'long', year: 'numeric' });
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });
  }
</script>
</body>
</html>
