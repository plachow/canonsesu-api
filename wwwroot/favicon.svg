<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper tray (top) -->
  <rect x="8" y="4" width="16" height="8" rx="1" fill="#CC0000"/>
  <!-- Printer body -->
  <rect x="4" y="10" width="24" height="13" rx="2" fill="#1C1C1C"/>
  <!-- Paper slot -->
  <rect x="8" y="14" width="16" height="2" rx="1" fill="#444"/>
  <!-- Status light -->
  <circle cx="24" cy="13" r="1.5" fill="#CC0000"/>
  <!-- Output paper -->
  <rect x="8" y="21" width="16" height="7" rx="1" fill="#fff"/>
  <!-- Output paper lines -->
  <line x1="10" y1="24" x2="22" y2="24" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="26" x2="18" y2="26" stroke="#DDD" stroke-width="1"/>
</svg>
